version: '3.9'

services:
  app:
    build: .
    ports:
      - "9922:9922"
    env_file:
      - .env.development
    depends_on:
      - db
      - redis
    networks:
      - ecommerce-network
  db:
    image: postgres:15-alpine
    container_name: ecommerce-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=@AnilDCTtechnology9817
      - POSTGRES_DB=ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network
    
networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: